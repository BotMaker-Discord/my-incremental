
<h2 class="sr-only">Incremental money game — buy upgrades to multiply your income, unlock levels and energy</h2>
<style>
.upg{width:100%;text-align:left;padding:9px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;margin-bottom:5px;display:block;font-size:13px;transition:border-color .15s,background .15s,opacity .2s;}
.upg:hover{background:var(--color-background-secondary);}
.upg.can{border-color:var(--color-border-success);background:var(--color-background-success);}
.upg.can:hover{filter:brightness(1.03);}
.upg.dim{opacity:0.35;}
.upg .un{font-weight:500;color:var(--color-text-primary);font-size:13px;line-height:1.3;}
.upg.can .un{color:var(--color-text-success);}
.upg .uc{font-size:11px;color:var(--color-text-secondary);margin-top:1px;font-family:var(--font-mono);}
.upg.can .uc{color:var(--color-text-success);opacity:0.75;}
.upg .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.prog{height:2px;background:var(--color-border-tertiary);border-radius:1px;margin-top:5px;overflow:hidden;}
.prog-f{height:100%;border-radius:1px;width:0%;background:var(--color-border-secondary);transition:width .2s;}
.upg.can .prog-f{background:var(--color-text-success);}
.badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap;flex-shrink:0;font-family:var(--font-sans);}
.bm{background:var(--color-background-success);color:var(--color-text-success);}
.bl{background:var(--color-background-info);color:var(--color-text-info);}
.be{background:var(--color-background-warning);color:var(--color-text-warning);}
.bu{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;}
.cl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;}
.cv{font-size:20px;font-weight:500;font-family:var(--font-mono);color:var(--color-text-primary);}
.lvbtn{width:100%;padding:8px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;font-family:var(--font-mono);font-size:12px;text-align:left;display:block;}
.lvbtn:hover{background:var(--color-background-secondary);}
.lvbtn.can{border-color:var(--color-border-info);background:var(--color-background-info);}
.lvbtn.can .lname{color:var(--color-text-info);}
.lvbtn.can .lcost{color:var(--color-text-info);opacity:0.7;}
.lvbtn:disabled{opacity:0.35;cursor:not-allowed;}
.lname{font-weight:500;color:var(--color-text-primary);}
.lcost{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
.sechead{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.09em;margin:0 0 7px;}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;font-family:var(--font-mono);}
.mrow+.mrow{border-top:0.5px solid var(--color-border-tertiary);}
.mrow .ml{color:var(--color-text-secondary);}
.mrow .mv{font-weight:500;}
.res-card{flex:1;min-width:120px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;}
.res-label{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.res-val{font-size:22px;font-weight:500;font-family:var(--font-mono);color:var(--color-text-primary);}
.res-rate{font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);margin-top:1px;}
.upg-scroll{max-height:420px;overflow-y:auto;padding-right:2px;}
.upg-scroll::-webkit-scrollbar{width:3px;}
.upg-scroll::-webkit-scrollbar-track{background:transparent;}
.upg-scroll::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px;}
.cathead{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;padding:6px 0 4px;border-top:0.5px solid var(--color-border-tertiary);margin-top:4px;}
.cathead:first-child{border-top:none;margin-top:0;padding-top:0;}
#pulse{animation:pulse .3s ease;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
</style>

<div style="padding:.75rem 0;max-width:680px;">

  <div id="notif" style="opacity:0;position:absolute;top:4px;right:0;font-size:12px;font-family:var(--font-mono);background:var(--color-background-success);color:var(--color-text-success);padding:3px 10px;border-radius:var(--border-radius-md);pointer-events:none;transition:opacity .4s;z-index:10;"></div>

  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;position:relative;">
    <div class="res-card">
      <div class="res-label">money</div>
      <div class="res-val" id="rv-money">$0</div>
      <div class="res-rate" id="rr-money">+1/s</div>
    </div>
    <div class="res-card" id="rc-energy" style="display:none;">
      <div class="res-label">energy</div>
      <div class="res-val" id="rv-energy">0</div>
      <div class="res-rate" id="rr-energy">+1/s</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:minmax(0,1fr) 210px;gap:12px;">

    <div>
      <div class="sechead">upgrades</div>
      <div class="upg-scroll" id="upg-list"></div>
    </div>

    <div>
      <div class="sechead">multipliers</div>
      <div class="card" style="padding:8px 12px;margin-bottom:12px;">
        <div class="mrow"><span class="ml">base</span><span class="mv">1/s</span></div>
        <div class="mrow"><span class="ml">upgrades</span><span class="mv" id="mv-up" style="color:var(--color-text-success);">x1</span></div>
        <div class="mrow" id="mr-lv" style="display:none;"><span class="ml">levels</span><span class="mv" id="mv-lv" style="color:var(--color-text-info);">x1</span></div>
        <div class="mrow" id="mr-en" style="display:none;"><span class="ml">energy</span><span class="mv" id="mv-en" style="color:var(--color-text-warning);">x1</span></div>
        <div class="mrow" id="mr-sl" style="display:none;"><span class="ml">super lvl</span><span class="mv" id="mv-sl">x1</span></div>
        <div class="mrow" style="border-top:0.5px solid var(--color-border-secondary)!important;"><span class="ml" style="font-weight:500;color:var(--color-text-primary);">= /s</span><span class="mv" id="mv-tot" style="font-size:14px;">1</span></div>
      </div>

      <div id="sec-lvl" style="display:none;">
        <div class="sechead">levels</div>
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div class="cl">count</div><div class="cv" id="lv-n">0</div></div>
          <div style="text-align:right;"><div class="cl">+/level</div><div class="cv" id="lv-b">0.10</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px;">
          <button class="lvbtn" id="btn-lv1"><div class="lname">+1</div><div class="lcost" id="lc1">…</div></button>
          <button class="lvbtn" id="btn-lv10"><div class="lname">+10</div><div class="lcost" id="lc10">…</div></button>
        </div>
        <button class="lvbtn" id="btn-lvmax" style="width:100%;"><div class="lname">buy max</div><div class="lcost" id="lcmax">…</div></button>
      </div>

      <div id="sec-sl" style="display:none;margin-top:10px;">
        <div class="sechead" style="color:var(--color-text-info);">super levels</div>
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div class="cl">count</div><div class="cv" id="sl-n">0</div></div>
          <div style="text-align:right;"><div class="cl">mult</div><div class="cv" id="sl-m">x1</div></div>
        </div>
        <button class="lvbtn" id="btn-sl"><div class="lname">buy super level</div><div class="lcost" id="slc">…</div></button>
      </div>
    </div>
  </div>
</div>

<script>
const UPGRADES=[
  {id:0,name:"x2 Money",cost:20,t:"mm",v:2,cat:"m"},
  {id:1,name:"x2 Money again",cost:50,t:"mm",v:2,cat:"m"},
  {id:2,name:"x2.5 Money",cost:100,t:"mm",v:2.5,cat:"m"},
  {id:3,name:"x2.3 Money",cost:400,t:"mm",v:2.3,cat:"m"},
  {id:4,name:"x3 Money",cost:1500,t:"mm",v:3,cat:"m"},
  {id:5,name:"x2.7 Money",cost:5000,t:"mm",v:2.7,cat:"m"},
  {id:6,name:"Unlock Levels",cost:10000,t:"ul",v:0,cat:"u"},
  {id:7,name:"x3.4 Money",cost:50000,t:"mm",v:3.4,cat:"m"},
  {id:8,name:"+0.2 mult per level",cost:150000,t:"lb",v:.2,cat:"l"},
  {id:9,name:"x3 Money",cost:300000,t:"mm",v:3,cat:"m"},
  {id:10,name:"x4 Money",cost:1e6,t:"mm",v:4,cat:"m"},
  {id:11,name:"+0.25 mult per level",cost:40e6,t:"lb",v:.25,cat:"l"},
  {id:12,name:"x5 Money",cost:250e6,t:"mm",v:5,cat:"m"},
  {id:13,name:"x5 Money again",cost:10e9,t:"mm",v:5,cat:"m"},
  {id:14,name:"x6 Money",cost:400e9,t:"mm",v:6,cat:"m"},
  {id:15,name:"+0.3 mult per level",cost:25e12,t:"lb",v:.3,cat:"l"},
  {id:16,name:"Unlock Energy",cost:100e12,t:"ue",v:0,cat:"u"},
  {id:17,name:"x3 Money",cost:1e15,t:"mm",v:3,cat:"m"},
  {id:18,name:"x2 Energy",cost:5e15,t:"em",v:2,cat:"e"},
  {id:19,name:"+0.4 mult per level",cost:1e18,t:"lb",v:.4,cat:"l"},
  {id:20,name:"x3 Energy",cost:1e19,t:"em",v:3,cat:"e"},
  {id:21,name:"x4 Money",cost:5e20,t:"mm",v:4,cat:"m"},
  {id:22,name:"Energy boosts Money +0.1",cost:1e21,t:"eb",v:.1,cat:"e"},
  {id:23,name:"x5 Energy",cost:1e22,t:"em",v:5,cat:"e"},
  {id:24,name:"Unlock Super Levels",cost:1e25,t:"us",v:0,cat:"u"},
  {id:25,name:"x10 Money",cost:1e28,t:"mm",v:10,cat:"m"},
  {id:26,name:"Energy boosts Money +0.15",cost:1e30,t:"eb",v:.15,cat:"e"},
  {id:27,name:"+1 mult per level",cost:1e32,t:"lb",v:1,cat:"l"},
  {id:28,name:"x10 Energy",cost:1e33,t:"em",v:10,cat:"e"},
  {id:29,name:"x20 Money",cost:1e36,t:"mm",v:20,cat:"m"},
  {id:30,name:"+2 mult per level",cost:1e40,t:"lb",v:2,cat:"l"},
  {id:31,name:"x50 Energy",cost:1e41,t:"em",v:50,cat:"e"},
  {id:32,name:"Energy boosts Money +0.2",cost:1e43,t:"eb",v:.2,cat:"e"},
  {id:33,name:"x50 Money",cost:1e44,t:"mm",v:50,cat:"m"},
  {id:34,name:"x100 Energy",cost:1e47,t:"em",v:100,cat:"e"},
  {id:35,name:"+5 mult per level",cost:1e50,t:"lb",v:5,cat:"l"},
  {id:36,name:"x100 Money",cost:1e54,t:"mm",v:100,cat:"m"},
  {id:37,name:"Energy boosts Money +0.3",cost:1e58,t:"eb",v:.3,cat:"e"},
  {id:38,name:"x500 Money",cost:1e62,t:"mm",v:500,cat:"m"},
  {id:39,name:"+10 mult per level",cost:1e66,t:"lb",v:10,cat:"l"},
  {id:40,name:"x1000 Energy",cost:1e68,t:"em",v:1000,cat:"e"},
  {id:41,name:"x1000 Money",cost:1e72,t:"mm",v:1000,cat:"m"},
];

const g={money:0,moneyMult:1,levelBonus:0,levels:0,levelsUnlocked:false,
  superLevels:0,superLevelsUnlocked:false,
  energy:0,energyMult:1,energyUnlocked:false,energyBoostStr:0};

const SFX=['','K','M','B','T','Qd','Qn','Sx','Sp','Oc','No','Dc'];
function fmt(n){
  if(!isFinite(n)||isNaN(n))return'???';
  if(n<0)return'-'+fmt(-n);
  if(n<1e3)return n<10?n.toFixed(2):n.toFixed(0);
  const e=Math.min(Math.floor(Math.log10(n)/3),SFX.length-1);
  const s=n/Math.pow(1000,e);
  return(s>=100?s.toFixed(1):s>=10?s.toFixed(2):s.toFixed(2))+SFX[e];
}
function fmtX(n){return'x'+fmt(n);}
function fmtM(n){return'$'+fmt(n);}

function getLvMult(){return g.levelsUnlocked?Math.max(1,1+(0.1+g.levelBonus)*g.levels):1;}
function getEnMult(){return g.energyUnlocked&&g.energyBoostStr>0?Math.pow(Math.max(1,g.energy+1),g.energyBoostStr):1;}
function getSlMult(){return g.superLevelsUnlocked?Math.pow(3,g.superLevels):1;}
function getMPS(){return g.moneyMult*getLvMult()*getEnMult()*getSlMult();}
function getEPS(){return g.energyUnlocked?g.energyMult:0;}
function getLvCost(n){return 10000*Math.pow(1.5,n??g.levels);}
function getSLCost(){return 1e25*Math.pow(1e5,g.superLevels);}

function getNLvCost(n){
  let t=0;for(let i=0;i<n;i++)t+=getLvCost(g.levels+i);return t;
}
function buyMaxLevels(){
  let total=0,count=0;
  while(true){
    const c=getLvCost(g.levels+count);
    if(total+c>g.money)break;
    total+=c;count++;
    if(count>10000)break;
  }
  if(count>0){g.money-=total;g.levels+=count;showNotif('+'+count+' levels');}
}

let notifTimer=null;
function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>el.style.opacity='0',1600);
}

const catLabel={m:'money',l:'level',e:'energy',u:'unlock'};
const catBadge={m:'bm',l:'bl',e:'be',u:'bu'};
const upgRefs=new Map();

function buildUpgrades(){
  const container=document.getElementById('upg-list');
  let lastCat=null;
  UPGRADES.forEach(u=>{
    if(u.cat!==lastCat){
      const h=document.createElement('div');
      h.className='cathead';
      h.dataset.cat=u.cat;
      h.textContent=catLabel[u.cat];
      container.appendChild(h);
      lastCat=u.cat;
    }
    const btn=document.createElement('button');
    btn.className='upg';
    btn.innerHTML=`<div class="toprow"><div class="un">${u.name}</div><span class="badge ${catBadge[u.cat]}">${catLabel[u.cat]}</span></div><div class="uc">${fmtM(u.cost)}</div><div class="prog"><div class="prog-f"></div></div>`;
    const bar=btn.querySelector('.prog-f');
    btn.addEventListener('click',()=>{
      if(g.money<u.cost)return;
      g.money-=u.cost;
      if(u.t==='mm')g.moneyMult*=u.v;
      if(u.t==='lb')g.levelBonus+=u.v;
      if(u.t==='ul')g.levelsUnlocked=true;
      if(u.t==='us')g.superLevelsUnlocked=true;
      if(u.t==='ue'){g.energyUnlocked=true;document.getElementById('rc-energy').style.display='';}
      if(u.t==='em')g.energyMult*=u.v;
      if(u.t==='eb')g.energyBoostStr+=u.v;
      btn.remove();
      upgRefs.delete(u.id);
      cleanEmptyCatheads();
      showNotif('✓ '+u.name);
    });
    upgRefs.set(u.id,{btn,bar,u});
    container.appendChild(btn);
  });
}

function cleanEmptyCatheads(){
  const container=document.getElementById('upg-list');
  const headers=container.querySelectorAll('.cathead');
  headers.forEach(h=>{
    let next=h.nextSibling;
    while(next&&next.classList&&next.classList.contains('cathead'))next=next.nextSibling;
    if(!next||!next.classList||!next.classList.contains('upg'))h.remove();
  });
}

function updateUpgrades(){
  let visIdx=0;
  upgRefs.forEach(({btn,bar,u})=>{
    const isEnergyUpg=u.cat==='e'||u.t==='ue';
    if(isEnergyUpg&&!g.energyUnlocked&&u.t!=='ue'){btn.style.display='none';return;}
    btn.style.display='';
    const can=g.money>=u.cost;
    const pct=Math.min(100,(g.money/u.cost)*100);
    btn.className='upg'+(can?' can':'')+(visIdx>=4&&!can?' dim':'');
    bar.style.width=pct+'%';
    visIdx++;
  });
}

function setEl(id,text){const e=document.getElementById(id);if(e)e.textContent=text;}
function showEl(id,vis){const e=document.getElementById(id);if(e)e.style.display=vis?'':'none';}

function render(){
  const mps=getMPS(),eps=getEPS();
  const lm=getLvMult(),em=getEnMult(),sm=getSlMult();
  const lc1=getLvCost(),lc10=getNLvCost(10),lcmax='buy max';

  setEl('rv-money',fmtM(g.money));
  setEl('rr-money','+'+fmt(mps)+'/s');
  setEl('rv-energy',fmt(g.energy));
  setEl('rr-energy','+'+fmt(eps)+'/s');

  setEl('mv-up',fmtX(g.moneyMult));
  setEl('mv-tot',fmt(mps));

  showEl('mr-lv',g.levelsUnlocked);
  if(g.levelsUnlocked){
    setEl('mv-lv',fmtX(lm));
    showEl('sec-lvl',true);
    setEl('lv-n',g.levels);
    setEl('lv-b','+'+(0.1+g.levelBonus).toFixed(2));
    setEl('lc1',fmtM(lc1));
    setEl('lc10',fmtM(lc10));
    const b1=document.getElementById('btn-lv1'),b10=document.getElementById('btn-lv10'),bm=document.getElementById('btn-lvmax');
    if(b1){b1.className='lvbtn'+(g.money>=lc1?' can':'');b1.disabled=g.money<lc1;}
    if(b10){b10.className='lvbtn'+(g.money>=lc10?' can':'');b10.disabled=g.money<lc10;}
    if(bm){bm.className='lvbtn'+(g.money>=lc1?' can':'');bm.disabled=g.money<lc1;}
  }

  showEl('mr-en',g.energyUnlocked&&g.energyBoostStr>0);
  if(g.energyUnlocked&&g.energyBoostStr>0)setEl('mv-en',fmtX(em));

  showEl('mr-sl',g.superLevelsUnlocked);
  if(g.superLevelsUnlocked){
    setEl('mv-sl',fmtX(sm));
    showEl('sec-sl',true);
    setEl('sl-n',g.superLevels);
    setEl('sl-m',fmtX(sm));
    const sc=getSLCost();
    setEl('slc',fmtM(sc));
    const bs=document.getElementById('btn-sl');
    if(bs){bs.className='lvbtn'+(g.money>=sc?' can':'');bs.disabled=g.money<sc;}
  }

  updateUpgrades();
}

document.getElementById('btn-lv1').addEventListener('click',()=>{
  const c=getLvCost();if(g.money<c)return;g.money-=c;g.levels++;
});
document.getElementById('btn-lv10').addEventListener('click',()=>{
  const c=getNLvCost(10);if(g.money<c)return;g.money-=c;g.levels+=10;showNotif('+10 levels');
});
document.getElementById('btn-lvmax').addEventListener('click',buyMaxLevels);
document.getElementById('btn-sl').addEventListener('click',()=>{
  const c=getSLCost();if(g.money<c)return;g.money-=c;g.superLevels++;showNotif('Super level '+g.superLevels+'!');
});

buildUpgrades();

setInterval(()=>{
  g.money+=getMPS()*0.05;
  if(g.energyUnlocked)g.energy+=getEPS()*0.05;
  render();
},50);
</script>
